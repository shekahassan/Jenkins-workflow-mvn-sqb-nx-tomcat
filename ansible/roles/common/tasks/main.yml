---
- name: Wait for SSH connectivity
  ansible.builtin.wait_for_connection:
    timeout: 300

- name: Set server timezone
  ansible.builtin.command:
    cmd: "timedatectl set-timezone {{ common_timezone }}"
  changed_when: false

- name: Update apt cache and install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Java runtime
  ansible.builtin.apt:
    name: "{{ java_package }}"
    state: present

- name: Ensure systemd daemon is available
  ansible.builtin.systemd:
    daemon_reload: true
